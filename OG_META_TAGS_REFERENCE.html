<!-- CACHE BUSTING NOTES -->
<!-- ============================================ -->

<!--
If social platforms show OLD images after updates:

1. Increment version number:
   ?v=2 → ?v=3 → ?v=4

2. Update in these files:
   - src/components/SEOHead.tsx (line ~16)
   - src/pages/ShareResult.tsx (line ~127)

3. Rebuild: npm run build

4. Force refresh on platforms:
   - Facebook: Use "Fetch new information" in Sharing Debugger
   - WhatsApp: Wait 7 days or clear app cache
   - Twitter: Use Card Validator
   - LinkedIn: Edit post and re-paste URL

5. Test with new version parameter
-->

<!-- ============================================ -->
<!-- TROUBLESHOOTING -->
<!-- ============================================ -->

<!--
PROBLEM: WhatsApp shows generic preview
SOLUTION:
- Check og:image URL is publicly accessible
- Verify image returns 200 OK status
- Ensure image is exactly 1200×630
- Try incrementing cache version (?v=3)

PROBLEM: Facebook shows old image
SOLUTION:
- Use Facebook Sharing Debugger
- Click "Fetch new information"
- Increment version parameter
- Wait a few minutes for CDN refresh

PROBLEM: Image doesn't load
SOLUTION:
- Test direct URL in browser
- Check CORS headers are set
- Verify edge function is deployed
- Check for JavaScript errors

PROBLEM: Preview shows wrong score
SOLUTION:
- Verify session ID is correct
- Check session is frozen (completed)
- Confirm database has score data
- Test edge function response

PROBLEM: Logo not showing
SOLUTION:
- Logo uses SVG text (no external file needed)
- Check SVG rendering in browser
- Verify text colors are set
- Test in different browsers
-->
